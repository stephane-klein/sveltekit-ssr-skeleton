scrape_configs:
  - job_name: sveltekit-app-dev
    scrape_interval: 10s
    metrics_path: /-/metrics
    static_configs:
      - targets: ["host.containers.internal:5173"]

  - job_name: sveltekit-app-prod
    scrape_interval: 10s
    metrics_path: /-/metrics
    static_configs:
      - targets: ["host.containers.internal:3000"]
