services:
  postgres:
    image: postgres:18.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - postgres:/var/lib/postgresql/
    healthcheck:
      test: ["CMD", "sh", "-c", "pg_isready -U $$POSTGRES_USER -h $$(hostname -i)"]
      interval: 10s
      start_period: 30s

  app:
    image: ghcr.io/stephane-klein/my-app:dev
    ports:
      - 3000
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/healthcheck"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 3
    environment:
      MY_APP_POSTGRES_URL: postgres://postgres:password@postgres:5432/postgres
      ORIGIN: http://localhost:3000

volumes:
  postgres:
    name: ${COMPOSE_PROJECT_NAME}_postgres
