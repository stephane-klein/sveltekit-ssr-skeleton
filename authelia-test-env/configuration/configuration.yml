###############################################################
#                   Authelia configuration                    #
#                   for local OIDC testing                    #
###############################################################

server:
  address: tcp://:9091/
  tls:
    certificate: /config/secrets/cert.pem
    key: /config/secrets/key.pem

log:
  level: debug

theme: auto

authentication_backend:
  file:
    path: /config/users.yml
    password:
      algorithm: argon2
      argon2:
        variant: argon2id
        iterations: 3
        memory: 65536
        parallelism: 4
        key_length: 32
        salt_length: 16

access_control:
  default_policy: deny
  rules:
    - domain: 127.0.0.1
      policy: one_factor

identity_validation:
  reset_password:
    jwt_secret: reset-password-jwt-secret

session:
  name: authelia_session
  secret: session-secret-password
  cookies:
    - domain: 127.0.0.1
      authelia_url: https://127.0.0.1:9091
  redis:
    host: redis
    port: 6379

storage:
  encryption_key: storage-encryption-password
  local:
    path: /data/db.sqlite3

notifier:
  disable_startup_check: true
  filesystem:
    filename: /data/notifications.yml

identity_providers:
  oidc:
    hmac_secret: hmac-secret-password
    jwks:
      - algorithm: RS256
        use: sig
        key_id: authelia-key
