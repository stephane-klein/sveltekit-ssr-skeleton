[env]
_.path = './node_modules/.bin'
_.source = [
  '.envrc',
  { path = 'scripts/load_postgres_variables.sh', tools = true, cacheable = false }
]
[shell_alias]
reload = "source scripts/load_postgres_variables.sh"


[tools]
node = "24.18.0"
pnpm = "11.9.0"
usql = "0.21.4"
"aqua:gitleaks/gitleaks" = "8.30.1"

[tasks.lint]
run ="pnpm run lint"

[tasks.format]
run ="pnpm run format"

[tasks.check]
run ="pnpm run check"

[tasks.lint-pkg]
run = "pnpm run lint:pkg"

[tasks.up]
run = "podman compose up -d"

[tasks.migrate]
run = "node src/migrate.js"

[tasks.seed]
run = "node src/seed.js"

[tasks.dump-schema]
run = "./scripts/dump-schema.sh"

[tasks.teardown]
run = "podman compose down -v --remove-orphans"

[tasks.clean]
run = "usql postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/${POSTGRES_DB} < sqls/clean.sql"

[tasks.enter-in-pg]
run = "usql postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/${POSTGRES_DB}"

[tasks.build-image]
run = "podman build -t my-app ."

[tasks.build-image-cache]
run = "podman build --layers -t my-app ."

[tasks.setup-git-hooks]
run = "scripts/setup-git-hooks.sh"

[tasks.gitleaks-check-push]
run = "scripts/gitleaks-check-push.sh"

[tasks.gitleaks-scan]
run = "gitleaks dir --no-banner -v {{config_root}}"


