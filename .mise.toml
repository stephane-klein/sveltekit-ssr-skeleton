[env]
_.path = './node_modules/.bin'
_.source = [
  '.envrc',
  { path = 'scripts/load_postgres_variables.sh', tools = true, cacheable = false }
]

[shell_alias]
reload = "source scripts/load_postgres_variables.sh"

[tools]
node = "24.18.0"
pnpm = "11.9.0"
usql = "0.21.4"
"aqua:gitleaks/gitleaks" = "8.30.1"

[tasks.dev]
run = "pnpm run dev"

[tasks.build]
run = "pnpm run build"

[tasks.preview]
run = "pnpm run preview"

[tasks.lint]
run ="pnpm run lint"

[tasks.format]
run ="pnpm run format"

[tasks.check]
run ="pnpm run check"

[tasks.lint-pkg]
run = "pnpm run lint:pkg"

[tasks.up]
run = "podman compose up -d"

[tasks.stop]
run = "podman compose stop"

[tasks.migrate]
run = "node src/migrate.js"

[tasks.seed]
run = "node src/seed.js"

[tasks.dump-schema]
run = "./scripts/dump-schema.sh"

[tasks.teardown]
run = "podman compose down -v --remove-orphans"

[tasks.clean]
run = "usql postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/${POSTGRES_DB} < sqls/clean.sql"

[tasks.enter-in-pg]
run = "usql postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@127.0.0.1:${POSTGRES_PORT}/${POSTGRES_DB}"

[tasks.build-image]
quiet = true
run = """
cd "{{ config_root }}"
GIT_BRANCH=$(
  jj log -r '::@ & bookmarks()' --no-graph -T 'bookmarks' 2>/dev/null ||
  git rev-parse --abbrev-ref HEAD 2>/dev/null ||
  echo "unknown"
)
GIT_BRANCH=${GIT_BRANCH:-unknown}
[ "$GIT_BRANCH" = "HEAD" ] && GIT_BRANCH="unknown"
podman build \\
  --build-arg GIT_HASH=$(git rev-parse HEAD) \\
  --build-arg GIT_BRANCH="$GIT_BRANCH" \\
  --build-arg GIT_DATE="$(git show -s --format=%ci)" \\
  --build-arg BUILD_STAMP="$(env TZ=Europe/Paris date '+%Y-%m-%d_%H:%M:%S-%Z')" \\
  -t ghcr.io/stephane-klein/my-app:latest .
"""

[tasks.build-dev-image]
quiet = true
run = """
cd "{{config_root }}"
GIT_BRANCH=$(
  jj log -r '::@ & bookmarks()' --no-graph -T 'bookmarks' 2>/dev/null ||
  git rev-parse --abbrev-ref HEAD 2>/dev/null ||
  echo "unknown"
)
GIT_BRANCH=${GIT_BRANCH:-unknown}
[ "$GIT_BRANCH" = "HEAD" ] && GIT_BRANCH="unknown"
podman build \\
  --build-arg GIT_HASH=$(git rev-parse HEAD) \\
  --build-arg GIT_BRANCH="$GIT_BRANCH" \\
  --build-arg GIT_DATE="$(git show -s --format=%ci)" \\
  --build-arg BUILD_STAMP="$(env TZ=Europe/Paris date '+%Y-%m-%d_%H:%M:%S-%Z')" \\
  -t ghcr.io/stephane-klein/my-app:dev .
"""

[tasks.setup-git-hooks]
run = "scripts/setup-git-hooks.sh"

[tasks.gitleaks-check-push]
run = "scripts/gitleaks-check-push.sh"

[tasks.gitleaks-scan]
run = "gitleaks dir --no-banner -v {{config_root}}"


