# Default values for my-app.
# This is a YAML-formatted file.

seed:
  enabled: false

app:
  image:
    repository: ghcr.io/stephane-klein/my-app
    tag: latest
    pullPolicy: Always

  replicaCount: 1

# PostgreSQL connection — built from the CNPG app secret.
postgresql:
  schema: public

# CloudNativePG cluster configuration — deployed in the same namespace as the app.
cnpg:
  clusterName: my-app
  namespace: ""
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:18.4
  storage:
    size: 1Gi
  # PostgreSQL `postgres` user password (auto-generated if empty)
  # Used for bootstrap and superuser access.
  bootstrapPassword: ""

# HTTP server (SvelteKit adapter-node)
port: 3000

# Ingress — expose the HTTP service externally
ingress:
  enabled: false
  host: ""
  path: /
  className: ""
  annotations: {}
  tls: []

# SMTP configuration for outgoing emails (password reset, notifications, etc.)
smtp:
  host: ""
  port: 587
  user: ""
  # SMTP password — passed directly as env var.
  # In production, consider creating a Secret and referencing it via envFrom.
  pass: ""
  from: noreply@example.com
  # Default recipient for the send-test-mail admin endpoint
  testTo: ""

# Public origin URL (e.g. https://my-app.example.com).
# Auto-derived from ingress.host when ingress is enabled.
# Explicitly set this value to override.
origin: ""

# Admin API token — Bearer authentication for /api/v1/admin/* endpoints.
# Must be at least 32 characters long.
adminToken: ""

# OpenID Connect / Authelia configuration
oidc:
  enabled: false
  issuer: ""
  clientId: ""
  # AUTHELIA_CLIENT_SECRET — passed directly as env var.
  # In production, consider creating a Secret and referencing it via envFrom.
  clientSecret: ""

# Pod DNS policy — use ClusterFirstWithHostNet to resolve sklein.internal from pods
dnsPolicy: ClusterFirst

# Allow unauthorized TLS connections (e.g. self-signed CA for internal services)
nodeTLSRejectUnauthorized: false

# Enable V8 memory-size optimization (--optimize-for-size --max-semi-space-size=2).
# These V8 flags cannot be passed via NODE_OPTIONS so a dedicated env var is used.
optimizeForMemorySize: false

# Node.js CLI options (e.g. "--max-old-space-size=128") passed via NODE_OPTIONS.
# Only flags allowed by process.allowedNodeEnvironmentFlags are accepted.
nodeOptions: ""

# Resource limits
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# Prometheus metrics — exposed at /metrics via prom-client.
# The pod template is annotated with prometheus.io/* so that
# Prometheus / VictoriaMetrics with kubernetes_sd_configs
# auto-discovers and scrapes the targets.
metrics:
  enabled: false
  # Grafana dashboard — ConfigMap labeled grafana_dashboard: "1" so
  # the Grafana sidecar auto-imports it.
  grafanaDashboard:
    enabled: false

# Node selector, tolerations, affinity (optional)
nodeSelector: {}
tolerations: []
affinity: {}
